version: '3.8'

services:
  db_banco:
    image: postgres:17-alpine
    container_name: postgres_banco_mvp
    environment:
      POSTGRES_USER: ${DB_USER:-devsu_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-banco_password_2026}
      POSTGRES_DB: ${DB_NAME:-banco_db}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./bd.sql:/docker-entrypoint-initdb.d/bd.sql
  backend_app:
    build: .
    container_name: springboot_banco_mvp
    ports:
      - "8080:8080"
    environment:
      # Sobreescribimos la URL para que apunte al contenedor de la base de datos
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db_banco:5432/${DB_NAME:-banco_db}
      - DB_USER=${DB_USER:-devsu_user}
      - DB_PASSWORD=${DB_PASSWORD:-banco_password_2026}
    depends_on:
      - db_banco

volumes:
  postgres_data:

